services:
  pgsql:
    image: postgres:latest
    container_name: "${DB_CONTAINER_NAME:-pgsql_db}"
    environment:
      POSTGRES_DB: "${DB_DATABASE:-local}"
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    healthcheck:
      test: [
        "CMD", "pg_isready", "-q",
        "-d", "${DB_DATABASE:-local}",
        "-U", "${DB_USERNAME}"
      ]
      retries: 3
      timeout: 5s
    ports:
     - ${DB_PORT:-5432}:5432
    volumes:
      - pgsql_db_data:/var/lib/postgresql

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: "${PGADMIN_CONTAINER_NAME:-pgadmin}"
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_EMAIL:-admin@local.com}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_PASSWORD:-admin}"
    ports:
      - ${PGADMIN_PORT:-5050}:80
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pgsql_db_data:
    driver: "local"
    name: "${DB_VOLUME_DATA_NAME:-pgsql_db_data}"
  pgadmin_data:
    driver: "local"
    name: "${PGADMIN_VOLUME_DATA_NAME:-pgadmin_data}"
